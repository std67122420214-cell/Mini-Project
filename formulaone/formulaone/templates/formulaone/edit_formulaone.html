{% extends 'layout.html' %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-3 mb-3">

<h1>Edit Driver</h1>
<hr>

<form method="POST">

  <div class="mb-3">
    <label class="form-label">Driver Name</label>
    <input
      type="text"
      name="name"
      class="form-control"
      value="{{ driver.name }}"
      required
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Number</label>
    <input
      type="number"
      name="number"
      class="form-control"
      value="{{ driver.number }}"
      required
    >
  </div>

  <div class="mb-3">
    <label class="form-label">World Championships</label>
    <input
      type="number"
      name="world_championships"
      class="form-control"
      value="{{ driver.world_championships }}"
      required
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Nationality</label>
    <input
      type="text"
      name="nationality"
      class="form-control"
      value="{{ driver.nationality }}"
      required
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Image URL</label>
    <input
      type="text"
      name="img_url"
      class="form-control"
      value="{{ driver.img_url }}"
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Biography</label>
    <textarea
      name="biography"
      class="form-control"
      rows="4"
    >{{ driver.biography }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Teams</label>

    <select
      name="teams"
      class="form-select"
      multiple
      size="6"
    >

      {% for team in teams %}
      <option
        value="{{ team.id }}"
        {% if team in driver.teams %}selected{% endif %}
      >
        {{ team.name }}
      </option>
      {% endfor %}

    </select>

  </div>

  <button class="btn btn-primary">
    <i class="bi bi-check"></i>
    Update Driver
  </button>

  <a href="{{ url_for('formulaone.index') }}" class="btn btn-secondary">
    Back
  </a>

</form>

</div>

{% endblock %}
