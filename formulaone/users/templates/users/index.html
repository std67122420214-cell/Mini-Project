{% extends 'layout.html' %}

{% block title %}
  {{ title }}
{% endblock %}

{% block content %}

<div class="container mt-3 mb-3">

  <h1>{{ title }}</h1>
  <hr>

  <div class="card">

    <div class="card-header">
      <h4>Profile Information</h4>
    </div>

    <div class="card-body">

      <div class="row mb-3">

        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" value="{{ current_user.username }}" readonly>
        </div>

        <div class="col-md-6">
          <label class="form-label">Email Address</label>
          <input type="text" class="form-control" value="{{ current_user.email }}" readonly>
        </div>

      </div>

      <div class="row mb-3">

        <div class="col-md-6">
          <label class="form-label">Firstname</label>
          <input type="text" class="form-control" value="{{ current_user.firstname }}" readonly>
        </div>

        <div class="col-md-6">
          <label class="form-label">Lastname</label>
          <input type="text" class="form-control" value="{{ current_user.lastname }}" readonly>
        </div>

      </div>

      <hr>

      <a href="{{ url_for('users.change_password') }}" class="btn btn-outline-secondary">
        <i class="bi bi-person"></i> Update Profile
      </a>

    </div>

  </div>

</div>

{% endblock %}
